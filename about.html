  <h1>About Aloha Smart System &amp; Musubi Media — Hawaii's Operator-Built POS &amp; Marketing</h1>
  <p>Aloha Smart System and Musubi Media are sister companies founded by Hawaii small-business operator Anthony Han. Aloha Smart System builds the software — Clover-authorized POS, Inventory Master, Table Order, Smart Kiosk, Delivery Hub, and the in-store Display Network. Musubi Media handles marketing — Instagram, TikTok, photography, and ad campaigns for Hawaii small businesses.</p>
  <p>Every product is field-tested in Anthony's own Honolulu restaurants — Soul Chicken Hawaii — before it ships to other operators. Built for Hawaii's reality: immigrant owners, bilingual staff, tight margins, tourists in the morning and locals at night.</p>
  <p>Honolulu, Hawaii. Contact <a href="mailto:info@alohasmartsystem.com">info@alohasmartsystem.com</a> · (808) 650-3331.</p>
