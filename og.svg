<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <!-- Background: warm sand (brand) -->
  <rect width="1200" height="630" fill="#F5EFE6"/>

  <!-- Subtle plumeria pattern in corners (very low opacity) -->
  <g fill="none" stroke="#C8553D" stroke-width="1" stroke-linejoin="round" opacity="0.10">
    <g transform="translate(80 80) scale(2)">
      <path d="M0 -16 C 6 -13 9 -7 6 -1 C 3 3 -3 3 -6 -1 C -9 -7 -6 -13 0 -16 Z"/>
      <g transform="rotate(72)"><path d="M0 -16 C 6 -13 9 -7 6 -1 C 3 3 -3 3 -6 -1 C -9 -7 -6 -13 0 -16 Z"/></g>
      <g transform="rotate(144)"><path d="M0 -16 C 6 -13 9 -7 6 -1 C 3 3 -3 3 -6 -1 C -9 -7 -6 -13 0 -16 Z"/></g>
      <g transform="rotate(216)"><path d="M0 -16 C 6 -13 9 -7 6 -1 C 3 3 -3 3 -6 -1 C -9 -7 -6 -13 0 -16 Z"/></g>
      <g transform="rotate(288)"><path d="M0 -16 C 6 -13 9 -7 6 -1 C 3 3 -3 3 -6 -1 C -9 -7 -6 -13 0 -16 Z"/></g>
      <circle r="2" fill="#C8553D" stroke="none"/>
    </g>
    <g transform="translate(1120 550) scale(2)">
      <path d="M0 -16 C 6 -13 9 -7 6 -1 C 3 3 -3 3 -6 -1 C -9 -7 -6 -13 0 -16 Z"/>
      <g transform="rotate(72)"><path d="M0 -16 C 6 -13 9 -7 6 -1 C 3 3 -3 3 -6 -1 C -9 -7 -6 -13 0 -16 Z"/></g>
      <g transform="rotate(144)"><path d="M0 -16 C 6 -13 9 -7 6 -1 C 3 3 -3 3 -6 -1 C -9 -7 -6 -13 0 -16 Z"/></g>
      <g transform="rotate(216)"><path d="M0 -16 C 6 -13 9 -7 6 -1 C 3 3 -3 3 -6 -1 C -9 -7 -6 -13 0 -16 Z"/></g>
      <g transform="rotate(288)"><path d="M0 -16 C 6 -13 9 -7 6 -1 C 3 3 -3 3 -6 -1 C -9 -7 -6 -13 0 -16 Z"/></g>
      <circle r="2" fill="#C8553D" stroke="none"/>
    </g>
  </g>

  <!-- A. mark — large, on the left -->
  <g transform="translate(140 140)">
    <text x="0" y="285" font-family="Inter Tight, system-ui, sans-serif" font-weight="700" font-size="320" letter-spacing="-0.04em" fill="#1A1A1F">A</text>
    <circle cx="265" cy="245" r="32" fill="#C8553D"/>
  </g>

  <!-- Wordmark + tagline on the right -->
  <g transform="translate(540 230)">
    <text x="0" y="0" font-family="Inter Tight, system-ui, sans-serif" font-weight="700" font-size="68" letter-spacing="-0.025em" fill="#1A1A1F">Aloha Smart System</text>
    <text x="0" y="62" font-family="Inter Tight, system-ui, sans-serif" font-weight="500" font-size="32" letter-spacing="-0.01em" fill="rgba(26,26,31,0.65)">Hawaii's payment + commerce platform.</text>

    <!-- Pill chip: Built in 808 / Clover / Honolulu -->
    <g transform="translate(0 110)">
      <rect x="0" y="0" rx="22" ry="22" width="380" height="44" fill="#FFFFFF" stroke="#C8553D" stroke-opacity="0.30" stroke-width="1"/>
      <circle cx="22" cy="22" r="5" fill="#C8553D"/>
      <text x="38" y="28" font-family="Inter Tight, system-ui, sans-serif" font-weight="600" font-size="14" letter-spacing="0.08em" fill="#7A2E1F">BUILT IN 808 · CLOVER-AUTHORIZED · HONOLULU</text>
    </g>
  </g>

  <!-- Bottom bar with URL -->
  <g transform="translate(140 560)">
    <text x="0" y="0" font-family="Inter Tight, system-ui, sans-serif" font-weight="600" font-size="22" letter-spacing="-0.01em" fill="rgba(26,26,31,0.55)">alohasmartsystem.com</text>
  </g>
</svg>
